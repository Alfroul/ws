name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: npx vitest run --exclude "**/git/**"
        env:
          CI: true

      - name: Verify CLI
        run: node packages/cli/dist/index.js --version

  e2e:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Start workspace in background
        run: |
          node packages/cli/dist/index.js start --config examples/mini-project/workspace.yaml &
          WS_PID=$!
          echo "WS_PID=$WS_PID" >> $GITHUB_ENV
          # Wait for API to be ready (max 30s)
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/health > /dev/null 2>&1; then
              echo "API ready after ${i}s"
              break
            fi
            sleep 1
          done

      - name: Test API root endpoint
        run: |
          response=$(curl -sf http://localhost:3000/)
          echo "Response: $response"
          echo "$response" | grep -q '"status":"ok"'

      - name: Test API health endpoint
        run: |
          response=$(curl -sf http://localhost:3000/health)
          echo "Response: $response"
          echo "$response" | grep -q '"healthy":true'

      - name: Stop workspace
        if: always()
        run: |
          node packages/cli/dist/index.js stop --config examples/mini-project/workspace.yaml || true
          kill $WS_PID 2>/dev/null || true
